name: study_assist
description: AI-Powered Student Learning Companion - An intelligent study assistant that helps students organize their study life and master subjects using NLP and Machine Learning.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  file_picker: ^6.1.1
  http: ^1.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  percent_indicator: ^4.2.3
  flutter_animate: ^4.3.0
  intl: ^0.18.1
  smooth_page_indicator: ^1.1.0
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  lottie: ^2.7.0
  path_provider: ^2.1.1
  glassmorphism: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
